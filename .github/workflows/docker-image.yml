name: Build Develop Image

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: develop-image
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Develop
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libffi-dev \
            libssl-dev \
            libpq-dev \
            default-libmysqlclient-dev \
            libjpeg-dev \
            zlib1g-dev \
            libyaml-dev \
            python3-dev

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --use-deprecated=legacy-resolver --no-cache-dir -r requirements.txt

      - name: Validate backend dependency graph
        run: python -m pip check

      - name: Compile backend sources
        run: python -m compileall backend/api

  publish-dev-image:
    name: Publish Develop Image
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set timestamp tag
        id: meta
        run: echo "timestamp=$(date -u +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Normalize image owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push develop image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            VUE_APP_VERSION=dev-${{ steps.meta.outputs.timestamp }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/yacht:dev-latest
            ghcr.io/${{ env.OWNER_LC }}/yacht:${{ steps.meta.outputs.timestamp }}
          cache-from: type=gha,scope=develop-image
          cache-to: type=gha,mode=max,scope=develop-image

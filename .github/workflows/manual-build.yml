name: Manual Image Build

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Tag or ref to build"
        required: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: yacht
            dockerfile: ./Dockerfile
            cache_scope: manual-yacht-image
            build_args: |
              VUE_APP_VERSION=${{ github.event.inputs.release }}
          - image_name: yacht-agent
            dockerfile: ./agent/Dockerfile
            cache_scope: manual-yacht-agent-image
            build_args: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.release }}

      - name: Normalize image owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Sanitize release tag
        id: meta
        run: |
          tag="${{ github.event.inputs.release }}"
          tag="${tag#refs/tags/}"
          tag="${tag#refs/heads/}"
          tag="$(echo "$tag" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/${{ matrix.image_name }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          provenance: mode=max
          sbom: true

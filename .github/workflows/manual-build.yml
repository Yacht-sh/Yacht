name: Manual Image Build

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Git ref or tag to build"
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build Manual Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.release }}

      - name: Normalize manual tag
        id: ref_meta
        run: |
          release="${{ github.event.inputs.release }}"
          sanitized="${release//\//-}"
          echo "tag=${sanitized}" >> "$GITHUB_OUTPUT"

      - name: Normalize image owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER_LC }}/yacht
          tags: |
            type=raw,value=${{ steps.ref_meta.outputs.tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            VUE_APP_VERSION=${{ github.event.inputs.release }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=manual-image
          cache-to: type=gha,mode=max,scope=manual-image
          provenance: mode=max
          sbom: true
